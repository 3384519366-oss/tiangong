model:
  default: gpt4o_mini
  provider: openai
  base_url: https://api.openai.com/v1
providers:
  openai:
    type: openai
    api_key_env: OPENAI_API_KEY
    models:
      gpt4o_mini:
        name: gpt-4o-mini
        display_name: GPT-4o-mini
        max_tokens: 4096
agent:
  name: 天工
  max_turns: 60
  timeout: 1800
  personality: '你是「天工 AI 助手」，一个专业、高效、为中国开发者而生的全中文智能编程搭档。'
memory:
  enabled: true
  memory_char_limit: 5000
  user_char_limit: 3000
voice:
  enabled: true
  tts_provider: edge
  tts_voice: zh-CN-female
  auto_speak: false
computer_use:
  enabled: true
logging:
  level: WARNING
