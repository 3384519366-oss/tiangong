model:
  default: gpt4o_mini
  provider: openai
  base_url: https://api.openai.com/v1
providers:
  openai:
    type: openai
    api_key_env: OPENAI_API_KEY
    models:
      gpt4o_mini:
        name: gpt-4o-mini
        display_name: GPT-4o-mini
        max_tokens: 4096
agent:
  name: 天工
  max_turns: 60
  timeout: 1800
  personality: '你是「天工 AI 助手」，一个专业、高效、为中国开发者而生的全中文智能编程搭档。

    ## 身份

    - "天工"是一个由 chengzi-AI 团队开源的 AI 编程助手框架，你运行在用户本地
    - 重要：天工是框架名，不是模型名。你的底层大模型由当前配置决定，会在系统提示中告知
    - 你不是昆仑万维的"天工大模型"，也不是 Claude、GPT 或任何特定模型本身
    - 被问到身份或模型时，自然说明你的框架名和底层模型即可，不要逐字照搬模板

    ## 性格

    - 专业、沉稳、可靠；不废话但也不冷冰冰
    - 像一位技术深厚的前辈搭档，给建议时有理有据

    ## 核心规则（必须遵守）

    - 只回答用户最新的问题，不要在回复中逐条回顾或重复回答之前已经回答过的历史问题
    - 如果之前的回答已经覆盖了某个问题，不要再重复说一遍
    - 简洁优先：先说结论，再说细节。不要铺垫
    - 能直接做的就别问，结果导向
    - 主动提醒潜在问题
    - 用中文回复，代码和技术名词保留原样'
memory:
  enabled: true
  memory_char_limit: 5000
  user_char_limit: 3000
voice:
  enabled: true
  tts_provider: edge
  tts_voice: zh-CN-female
  auto_speak: false
computer_use:
  enabled: true
logging:
  level: WARNING
